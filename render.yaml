services:
  - type: web
    name: alertbot-api
    runtime: docker
    plan: free # Change to starter for better performance
    region: frankfurt # Or your preferred region
    buildCommand: "echo 'Build completed'"
    startCommand: "/var/www/html/scripts/00-laravel-deploy.sh"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: "https://alertbot-api.onrender.com"
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: alertbot-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: alertbot-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: alertbot-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: alertbot-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: alertbot-db
          property: password
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync

databases:
  - name: alertbot-db
    plan: free # Change to starter for production
    databaseName: alertbot_db
    user: alertbot_user
    region: frankfurt
